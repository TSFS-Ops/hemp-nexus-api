# CI/CD Pipeline - Compliance Matching Platform
# Runs on every push to main and every pull request.
# Blocks deployment if any step fails.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck-test:
    name: Lint → Typecheck → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Terminology guard
        run: node scripts/terminology-guard.mjs

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bunx vitest run --reporter=verbose
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Notification regression suite — runs on every PR (and push to main).
      # Covers preferences, unsubscribe/suppression, admin routing/allowlist,
      # in-app auto-resolve wiring + behaviour, and delivery metrics/alerts.
      # Kept as its own step so a notification regression surfaces with a
      # distinct, obvious failure label in the PR checks UI.
      - name: Notification regression suite
        run: |
          bunx vitest run --reporter=verbose \
            src/tests/batch-m-notifications-prefs.test.ts \
            src/tests/admin-engagements-notify-guard.test.ts \
            src/tests/d4b-admin-notify-event-allowlist.test.ts \
            src/tests/not-008-resolve-notifications-behaviour.test.ts \
            src/tests/not-008-resolve-notifications-wiring.test.ts \
            src/tests/notification-delivery-metrics-and-alerts.test.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build production bundle
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb dist | cut -f1)
          BUNDLE_MB=$(echo "scale=2; $BUNDLE_SIZE / 1048576" | bc)
          echo "Bundle size: ${BUNDLE_MB}MB"
          # Fail if bundle exceeds 15MB
          if [ "$BUNDLE_SIZE" -gt 15728640 ]; then
            echo "::error::Bundle size ${BUNDLE_MB}MB exceeds 15MB limit"
            exit 1
          fi

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 7

  drift-check:
    name: Schema drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run drift check
        run: bun run check:drift

  e2e-soft-route:
    # Authenticated end-to-end proof for the POI mint soft-route.
    #
    # Drives the real, deployed `match/{id}/generate-poi` edge function
    # with a real user JWT (minted via the service-role generate-link →
    # verifyOtp flow) against a controlled fixture match whose ONLY
    # eligibility failure is a missing buyer_id. Asserts the full
    # 422 → 202 contract: source stamping, engagement guard (409),
    # idempotency replay, and zero-credit burn.
    #
    # Requires three repository secrets:
    #   - VITE_SUPABASE_URL
    #   - VITE_SUPABASE_PUBLISHABLE_KEY
    #   - SUPABASE_SERVICE_ROLE_KEY  ← keep tightly scoped, CI only
    #
    # If the service-role key is absent the Deno test self-skips with a
    # WARN — we hard-fail the job in that case so a missing secret is
    # never silently green.
    name: E2E — POI mint soft-route (422 → 202)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't run on PRs from forks: forks can't see secrets, so the test
    # would always skip-then-fail. Trusted internal PRs (same-repo) and
    # pushes to main get the full check.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Verify required secrets are present
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for v in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Required secret $v is not configured on this repo."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Aborting: the e2e soft-route test cannot run without all three secrets."
            exit 1
          fi

      - name: Run authenticated soft-route e2e test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # --no-check: this file imports the deployed function over HTTP,
        # not local TS — type-checking other functions here is noise.
        # --fail-fast: stop on first contract violation so logs stay
        # short.
        run: |
          deno test \
            --allow-net \
            --allow-env \
            --no-check \
            --fail-fast \
            supabase/functions/match/e2e_soft_route_test.ts

  dependency-audit:
    # Fails the build on HIGH or CRITICAL CVEs in production deps.
    # Dev-only vulnerabilities are surfaced in logs but do not block.
    # Out-of-cycle bumps land via Dependabot (see .github/dependabot.yml).
    name: Dependency audit (HIGH/CRITICAL gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit production dependencies
        # `npm audit` reads package-lock; --omit=dev scopes to runtime risk.
        # `--audit-level=high` means HIGH or CRITICAL fails the job.
        run: npm audit --omit=dev --audit-level=high

      - name: Audit dev dependencies (advisory only)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=high

