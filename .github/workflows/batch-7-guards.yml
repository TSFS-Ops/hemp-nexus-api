# Batch 7 — Registry Search/Claim Rules Hardening guard pipeline.
#
# Runs on every pull request and every push to main. Blocks merges
# when prebuild guards, Batch 7 parity scripts, or the Batch 7 test
# suite fail.
#
# This workflow is intentionally separate from the main CI workflow so
# Batch 7 regressions surface with a distinct, obvious failure label
# in the PR checks UI.

name: Batch 7 Guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: batch-7-guards-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  batch-7-guards:
    name: Prebuild guards · parity · Batch 7 tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 1. Full prebuild guard chain. This runs every check-*.mjs script
      #    that ships in `package.json#scripts.prebuild`, which already
      #    includes all Batch 7 guards
      #    (check-registry-claim-rules-parity, check-registry-claim-rules-forbidden-wording,
      #     check-registry-batch7-no-auto-send).
      - name: Prebuild guard chain
        run: bun run prebuild
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # 2. Explicit parity scripts for Batch 7. Re-run them on their
      #    own so a Batch 7 parity failure can be diagnosed at a glance
      #    without scrolling through the full prebuild chain.
      - name: Batch 7 parity scripts (explicit)
        run: |
          node scripts/check-registry-claim-rules-parity.mjs
          node scripts/check-registry-claim-rules-forbidden-wording.mjs
          node scripts/check-registry-batch7-no-auto-send.mjs

      # 3. Full Batch 7 test suite. Hard-fails the PR on any regression.
      - name: Batch 7 test suite
        run: bunx vitest run --reporter=verbose src/tests/batch-7-*.test.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
