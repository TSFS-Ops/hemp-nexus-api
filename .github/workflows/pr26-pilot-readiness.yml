name: PR 26 Pilot Readiness

on: {pull_request: {paths: ['supabase/migrations/20260713090000_pilot_fixture_and_readiness_rpc.sql', 'src/pages/admin/funder-workspace/PilotConsole.tsx', 'src/pages/admin/funder-workspace/NewRelease.tsx', 'src/pages/funder/workspace/DealDetail.tsx', 'src/tests/funder-workspace-pilot-fixture-migration.test.ts', 'src/tests/funder-workspace-batch3-funder-ui.test.ts', 'docs/pr-26-validation-package.md', '.github/workflows/pr26-pilot-readiness.yml']}, workflow_dispatch: {}}

concurrency: {group: 'pr26-pilot-readiness-${{ github.ref }}', cancel-in-progress: true}

jobs: {focused-source-validation: {name: 'Focused tests + typecheck (no database required)', runs-on: ubuntu-latest, timeout-minutes: 15, steps: [{name: 'Checkout code', uses: 'actions/checkout@v4'}, {name: 'Setup Bun', uses: 'oven-sh/setup-bun@v2', with: {bun-version: latest}}, {name: 'Install dependencies', run: 'bun install --frozen-lockfile'}, {name: 'Focused - pilot fixture migration tests', run: 'bunx vitest run src/tests/funder-workspace-pilot-fixture-migration.test.ts --reporter=verbose'}, {name: 'Focused - funder workspace batch 3 UI tests', run: 'bunx vitest run src/tests/funder-workspace-batch3-funder-ui.test.ts --reporter=verbose'}, {name: 'Full Vitest suite', run: 'bunx vitest run --reporter=verbose', env: {VITE_SUPABASE_URL: '${{ secrets.VITE_SUPABASE_URL }}', VITE_SUPABASE_PUBLISHABLE_KEY: '${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}'}}, {name: 'TypeScript typecheck', run: 'bunx tsc --noEmit'}]},

disposable-database-proof: {name: 'Disposable database - migration, idempotency, isolation proof', runs-on: ubuntu-latest, timeout-minutes: 20, needs: focused-source-validation, steps: [{name: 'Checkout code', uses: 'actions/checkout@v4'}, {name: 'Install psql client', run: 'sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client'}, {name: 'Install Supabase CLI', uses: 'supabase/setup-cli@v1', with: {version: latest}}, {name: 'Start local Supabase (disposable, ephemeral containers only)', run: 'supabase start'}, {name: 'Apply all migrations fresh', run: 'supabase db reset'}, {name: 'Re-apply all migrations a second time (idempotency proof)', run: 'supabase db reset'},

{name: 'Funder organisations must be the pre-existing ids', run: "psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -v ON_ERROR_STOP=1 -c \"select id, name, status from public.p5_batch3_funder_organisations where id in ('11111111-1111-1111-1111-111111111111','22222222-2222-2222-2222-222222222222') order by name;\""},

{name: 'Demo match', run: "psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -v ON_ERROR_STOP=1 -c \"select id, buyer_org_id, seller_org_id, hash from public.matches where id = '00000000-0000-4000-a000-000000000005';\""},

{name: 'Evidence chain', run: "psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -v ON_ERROR_STOP=1 -c \"select id, current_version_id from public.p5_batch2_evidence_items where id = '00000000-0000-4000-a000-000000000009';\""},

{name: 'Readiness RPC', run: "psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -v ON_ERROR_STOP=1 -c \"set role service_role; select * from public.fw_admin_check_pilot_fixtures_v1();\""},

{name: 'Isolation proof must return 0', run: "psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -v ON_ERROR_STOP=1 -c \"select count(*) as releases_to_isolation_fund from public.funder_deal_releases where match_id = '00000000-0000-4000-a000-000000000005' and funder_organisation_id = '22222222-2222-2222-2222-222222222222';\""},

{name: 'Stop local Supabase', if: 'always()', run: 'supabase stop || true'}]}}
