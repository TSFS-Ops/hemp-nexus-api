# ============================================================
# Phase 1A Enterprise Support Centre — Behavioural Security Gate
#
# Provisions an isolated, disposable Supabase Postgres stack via
# the Supabase CLI, applies the FULL repository migration chain,
# then executes the database-native behavioural proof:
#
#   supabase/tests/phase_1a_support_behavioural_proof.sql
#
# The job MUST fail if:
#   - DATABASE_URL is missing at proof time
#   - the target database looks production-like
#   - the migration chain fails
#   - the proof file is missing or empty
#   - any behavioural assertion fails (ON_ERROR_STOP=1)
#
# Never runs against production. No production secrets required.
# Required-check name (recommended for branch protection):
#   phase-1a-support-behavioural-security
# ============================================================
name: Phase 1A Support Behavioural Security

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/phase_1a_support_behavioural_proof.sql'
      - 'scripts/phase-1a-behavioural-ci.sh'
      - 'src/tests/phase-1a-support-*.ts'
      - '.github/workflows/phase-1a-support-behavioural-security.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/phase_1a_support_behavioural_proof.sql'
      - 'scripts/phase-1a-behavioural-ci.sh'
      - 'src/tests/phase-1a-support-*.ts'
      - '.github/workflows/phase-1a-support-behavioural-security.yml'
  workflow_dispatch:

concurrency:
  group: phase-1a-support-behavioural-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase-1a-support-behavioural-security:
    name: Phase 1A Support Behavioural Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install repository dependencies
        run: bun install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify proof artefacts present
        run: |
          set -euo pipefail
          test -s supabase/tests/phase_1a_support_behavioural_proof.sql \
            || { echo "::error::Behavioural proof file missing/empty"; exit 2; }
          test -x scripts/phase-1a-behavioural-ci.sh \
            || chmod +x scripts/phase-1a-behavioural-ci.sh
          test -s scripts/phase-1a-behavioural-ci.sh \
            || { echo "::error::CI proof runner missing/empty"; exit 2; }

      - name: Start isolated Supabase stack (disposable)
        run: |
          set -euo pipefail
          # `supabase start` boots a local Postgres+Auth+PostgREST stack
          # and applies every migration under supabase/migrations in
          # timestamp order. If any migration fails the command exits
          # non-zero and this step fails the job.
          supabase start --exclude studio,inbucket,imgproxy,edge-runtime,realtime,storage-api,pgadmin-schema-diff,logflare,vector

      - name: Resolve disposable DATABASE_URL
        id: dburl
        run: |
          set -euo pipefail
          # Supabase CLI exposes the local DB port on 54322 by default.
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "Using disposable DB: $DB_URL"

      - name: Reject production-like database identifiers
        run: |
          set -euo pipefail
          if echo "$DATABASE_URL" | grep -qiE '(prod|live|customer|izenzo\.co\.za)'; then
            echo "::error::DATABASE_URL matches production-like pattern — refusing to run."
            exit 2
          fi
          # Extra: confirm we are on localhost.
          echo "$DATABASE_URL" | grep -qE '@(127\.0\.0\.1|localhost):' \
            || { echo "::error::Behavioural proof must run against localhost only."; exit 2; }

      - name: Confirm full migration chain applied
        run: |
          set -euo pipefail
          # `supabase migration list` shows local vs remote; here we
          # only care that every local file is applied to local.
          supabase migration list --local || true
          # Sanity assertion: the Phase 1A support_tickets table exists.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tAc \
            "SELECT to_regclass('public.support_tickets') IS NOT NULL;" \
            | grep -q '^t$' \
            || { echo "::error::support_tickets missing after migrations"; exit 2; }

      - name: Run Phase 1A behavioural SQL proof (CI gate)
        run: |
          set -euo pipefail
          # scripts/phase-1a-behavioural-ci.sh enforces:
          #   - DATABASE_URL present
          #   - not production-like
          #   - proof file present
          #   - psql -v ON_ERROR_STOP=1 executes every assertion
          # Any assertion RAISEs EXCEPTION → non-zero exit → job fails.
          bash scripts/phase-1a-behavioural-ci.sh 2>&1 | tee /tmp/phase-1a-proof.log
          # Belt-and-braces: fail if the header banner never printed.
          grep -q 'Phase 1A behavioural proof: PASSED' /tmp/phase-1a-proof.log \
            || { echo "::error::Proof did not report PASSED — treating as skipped."; exit 2; }

      - name: Run Phase 1A Vitest suites
        run: |
          set -euo pipefail
          bunx vitest run --reporter=verbose \
            src/tests/phase-1a-support-schema-conformance.test.ts \
            src/tests/phase-1a-support-projection-regression.test.ts \
            src/tests/phase-1a-support-behavioural.test.ts

      - name: Upload proof log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1a-behavioural-proof-log
          path: /tmp/phase-1a-proof.log
          if-no-files-found: warn

      - name: Stop and remove disposable Supabase stack
        if: always()
        run: |
          supabase stop --no-backup || true
