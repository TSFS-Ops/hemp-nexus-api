# PR #26 - Pilot Readiness Validation (structural, fail-closed)
#
# Runs entirely on GitHub-hosted runners against a disposable Postgres
# service container. Never connects to the live Lovable Cloud database
# and never merges the PR.
#
# What this workflow proves when it goes green:
#   - the migration set applies against a disposable Postgres 15 that has
#     a minimal Supabase compatibility surface (auth/storage schemas,
#     anon/authenticated/service_role roles, auth.uid()/jwt()/role()
#     stubs, pgcrypto/uuid-ossp);
#   - the migration set is idempotent (drop + reapply succeeds);
#   - the two pilot funder-organisation fixtures on the fixed IDs
#     11111111-1111-1111-1111-111111111111 (Pilot Funder Bank) and
#     22222222-2222-2222-2222-222222222222 (Isolation Test Fund)
#     end up correctly linked, as proven by fw_admin_check_pilot_fixtures_v1() reporting Ready for all nine checks;
#   - no funder_deal_releases row links any deal to the Isolation Test
#     Fund fixed ID (isolation invariant);
#   - the focused Funder Workspace test files and the full Vitest suite
#     pass;
#   - the TypeScript project typechecks.
#
# What this workflow does NOT prove:
#   - live Supabase Auth, Storage, signed URLs, or RLS as executed by
#     PostgREST/GoTrue;
#   - browser sessions / authenticated preview journeys;
#   - production data behaviour.
#
# The workflow's final gate step fails the job if any mandatory result
# is not PASS. A green job status is a genuine pass, not a "look at the
# artifact" pass.

name: PR26 Pilot Readiness Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "src/pages/admin/funder-workspace/**"
      - "src/pages/funder/workspace/**"
      - "src/lib/funder-workspace/**"
      - "src/tests/funder-workspace-*.test.ts"
      - "docs/pr-26-validation-package.md"
      - ".github/workflows/pr26-pilot-readiness-validation.yml"
  workflow_dispatch:

concurrency:
  group: pr26-pilot-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-validation:
    name: Source - focused tests - full Vitest - typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record commit SHA
        run: |
          mkdir -p validation-artifact
          echo "commit_sha=$GITHUB_SHA" | tee validation-artifact/00-sha.txt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (fail-closed)
        run: bun install --frozen-lockfile 2>&1 | tee validation-artifact/01-install.txt

      - name: Typecheck (fail-closed)
        run: |
          set -o pipefail
          bunx tsc --noEmit -p tsconfig.app.json 2>&1 | tee validation-artifact/12-typecheck.txt
          echo "TYPECHECK_OK" | tee -a validation-artifact/12-typecheck.txt

      - name: Focused Funder Workspace tests (fail-closed)
        run: |
          set -o pipefail
          bunx vitest run --reporter=verbose \
            src/tests/funder-workspace-batch6-demo-journey.test.ts \
            src/tests/funder-workspace-pilot-readiness-fixes.test.ts \
            src/tests/funder-workspace-pilot-pack-resolution.test.ts \
            src/tests/funder-workspace-release-state-consistency.test.ts \
            src/tests/pr26-pilot-readiness-workflow-conformance.test.ts \
            2>&1 | tee validation-artifact/10-focused-tests.txt
            echo "FOCUSED_TESTS_OK" | tee -a validation-artifact/10-focused-tests.txt

      - name: Full Vitest suite - PR head (evidence + comparison input, non-blocking)
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key-for-vitest
        run: |
          set +e
          bunx vitest run --reporter=verbose --reporter=json --outputFile=validation-artifact/11-full-vitest-head.json 2>&1 | tee validation-artifact/11-full-vitest-head.txt
          code=${PIPESTATUS[0]}
          echo "HEAD_VITEST_EXIT_CODE=${code}" | tee validation-artifact/11b-head-exit-code.txt
          exit 0

      - name: Checkout base/main branch for baseline comparison
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || 'main' }}
          path: base-checkout

      - name: Install dependencies on base/main (evidence-only, non-blocking)
        run: |
          set +e
          cd base-checkout
          bun install --frozen-lockfile 2>&1 | tee ../validation-artifact/13-base-install.txt
          exit 0

      - name: Full Vitest suite - base/main (evidence + comparison input, non-blocking)
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy-anon-key-for-vitest
        run: |
          set +e
          cd base-checkout
          bunx vitest run --reporter=verbose --reporter=json --outputFile=../validation-artifact/14-full-vitest-base.json 2>&1 | tee ../validation-artifact/14-full-vitest-base.txt
          code=${PIPESTATUS[0]}
          cd ..
          echo "BASE_VITEST_EXIT_CODE=${code}" | tee validation-artifact/14b-base-exit-code.txt
          exit 0

      - name: Compare full Vitest suite - PR head vs base (fail-closed regression gate)
        run: |
          set -o pipefail
          node scripts/ci/compare-vitest-baseline.mjs \
            validation-artifact/11-full-vitest-head.json \
            validation-artifact/14-full-vitest-base.json \
            validation-artifact/15-baseline-comparison.md 2>&1 | tee validation-artifact/15b-comparison-stdout.txt

      - name: Source validation gate summary (PR-specific mandatory gate)
        if: always()
        run: |
          set -euo pipefail
          status_file=$(mktemp)
          echo 0 > "$status_file"
          pass_or_fail() {
            local label="$1"; local file="$2"; local needle="$3"
            if [ -f "$file" ] && grep -q "$needle" "$file"; then
              echo "PASS $label"
            else
              echo "FAIL $label"
              echo 1 > "$status_file"
            fi
          }
          head_failed="n/a"; base_failed="n/a"; introduced="n/a"; shared="n/a"; main_only="n/a"
          if [ -f validation-artifact/15b-comparison-stdout.txt ]; then
            head_failed=$(grep -o 'HEAD_FAILED_TOTAL=[0-9]*' validation-artifact/15b-comparison-stdout.txt | cut -d= -f2 || true)
            base_failed=$(grep -o 'BASE_FAILED_TOTAL=[0-9]*' validation-artifact/15b-comparison-stdout.txt | cut -d= -f2 || true)
            introduced=$(grep -o 'PR_INTRODUCED_REGRESSIONS=[0-9]*' validation-artifact/15b-comparison-stdout.txt | cut -d= -f2 || true)
            shared=$(grep -o 'SHARED_BASELINE_FAILURES=[0-9]*' validation-artifact/15b-comparison-stdout.txt | cut -d= -f2 || true)
            main_only=$(grep -o 'MAIN_ONLY_FAILURES=[0-9]*' validation-artifact/15b-comparison-stdout.txt | cut -d= -f2 || true)
          fi
          {
            echo "# PR #26 Pilot Readiness - Source validation gate summary"
            echo
            echo "Commit: $GITHUB_SHA"
            echo
            echo "## Mandatory PR-specific checks"
            pass_or_fail "typecheck" validation-artifact/12-typecheck.txt "TYPECHECK_OK"
            pass_or_fail "focused_funder_workspace_tests" validation-artifact/10-focused-tests.txt "FOCUSED_TESTS_OK"
            pass_or_fail "baseline_comparison_completed_zero_regressions" validation-artifact/15b-comparison-stdout.txt "COMPARISON_OK"
            echo
            echo "## Full-suite evidence (informational; shared baseline failures do not block this gate)"
            echo "Full-suite failures on PR head: ${head_failed}"
            echo "Full-suite failures on base/main: ${base_failed}"
            echo "PR-introduced regressions: ${introduced}"
            echo "Shared baseline failures (pre-existing on main): ${shared}"
            echo "Main-only failures: ${main_only}"
            echo
            fail_now="$(cat "$status_file")"
            if [ "$fail_now" -eq 0 ]; then
              echo "SOURCE_GATE_RESULT: PASS"
            else
              echo "SOURCE_GATE_RESULT: FAIL"
            fi
          } | tee validation-artifact/16-source-gate-verdict.md
          exit "$(cat "$status_file")"

      - name: Upload source validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr26-source-validation
          path: validation-artifact/

  database-validation:
    name: Disposable DB - migrations - idempotency - fixtures - isolation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: supabase/postgres:15.14.1.147
        env:
          POSTGRES_USER: supabase_admin
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: supabase_admin
      PGPASSWORD: postgres
      PGDATABASE: postgres
      # Fixed IDs from supabase/migrations/20260712174259_*.sql
      PILOT_FUNDER_BANK_ID: "11111111-1111-1111-1111-111111111111"
      ISOLATION_TEST_FUND_ID: "22222222-2222-2222-2222-222222222222"
      DEMO_MATCH_ID: "00000000-0000-4000-a000-000000000005"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Prepare artifact dir
        run: mkdir -p validation-artifact

      - name: Bootstrap Supabase-compatible schemas, roles, extensions & realtime publication [fail-closed]
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 <<'SQL' 2>&1 | tee validation-artifact/20-bootstrap.txt
          -- Deterministic compatibility surface only. Does not prove
          -- real Supabase Auth/Storage/RLS behaviour.
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE SCHEMA IF NOT EXISTS extensions;
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          DO $$ BEGIN CREATE ROLE anon NOLOGIN;
            EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated NOLOGIN;
            EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE service_role NOLOGIN BYPASSRLS;
            EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticator NOINHERIT LOGIN PASSWORD 'postgres';
            EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          GRANT anon, authenticated, service_role TO authenticator;

          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            email text,
            email_confirmed_at timestamptz,
            raw_user_meta_data jsonb DEFAULT '{}'::jsonb,
            created_at timestamptz DEFAULT now()
          );
          -- Real supabase/postgres images already create auth.users via their
          -- own init scripts before this bootstrap runs, so the CREATE TABLE
          -- above is a no-op there; ensure the column exists either way.
          ALTER TABLE auth.users ADD COLUMN IF NOT EXISTS email_confirmed_at timestamptz;
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id text PRIMARY KEY,
            name text,
            owner uuid,
            public boolean DEFAULT false,
            avif_autodetection boolean DEFAULT false,
            file_size_limit bigint,
            allowed_mime_types text[],
            created_at timestamptz DEFAULT now(),
            updated_at timestamptz DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS storage.objects (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id text REFERENCES storage.buckets(id),
            name text,
            owner uuid,
            metadata jsonb DEFAULT '{}'::jsonb,
            created_at timestamptz DEFAULT now()
          );

          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $fn$ SELECT NULL::uuid $fn$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text
            LANGUAGE sql STABLE AS $fn$ SELECT NULL::text $fn$;
          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb
            LANGUAGE sql STABLE AS $fn$ SELECT '{}'::jsonb $fn$;

          CREATE OR REPLACE FUNCTION storage.foldername(name text) RETURNS text[]
            LANGUAGE sql IMMUTABLE AS $fn$
              SELECT string_to_array(name, '/')
            $fn$;
          CREATE OR REPLACE FUNCTION storage.filename(name text) RETURNS text
            LANGUAGE sql IMMUTABLE AS $fn$
              SELECT split_part(name, '/', array_length(string_to_array(name,'/'),1))
            $fn$;
          CREATE OR REPLACE FUNCTION storage.extension(name text) RETURNS text
            LANGUAGE sql IMMUTABLE AS $fn$
              SELECT split_part(name, '.', array_length(string_to_array(name,'.'),1))
            $fn$;
          CREATE EXTENSION IF NOT EXISTS pg_cron;
          DO $do$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = 'supabase_realtime') THEN
              CREATE PUBLICATION supabase_realtime;
            END IF;
          END
          $do$;
          CREATE SCHEMA IF NOT EXISTS realtime;
          CREATE TABLE IF NOT EXISTS realtime.messages (
            id uuid NOT NULL DEFAULT gen_random_uuid(),
            topic text NOT NULL,
            extension text NOT NULL,
            payload jsonb,
            event text,
            private boolean DEFAULT false,
            updated_at timestamp NOT NULL DEFAULT now(),
            inserted_at timestamp NOT NULL DEFAULT now(),
            PRIMARY KEY (id, inserted_at)
          );
          CREATE OR REPLACE FUNCTION realtime.topic() RETURNS text AS $$
            SELECT nullif(current_setting('realtime.topic', true), '')::text;
          $$ LANGUAGE sql STABLE;
          SQL

      - name: Preflight - verify disposable Supabase-compatible environment (fail-closed)
        run: |
          set -euo pipefail
          fail=0
          check() { echo "PASS  $1"; }
          failcheck() { echo "FAIL  $1"; fail=1; }
          LIVE_PROJECT_REF="ugrfyhwlonlmlcmcpcdm"
          if [ "$PGHOST" = "127.0.0.1" ] || [ "$PGHOST" = "localhost" ]; then check "pghost_is_local"; else failcheck "pghost_is_local"; fi
          if env | grep -F -q "$LIVE_PROJECT_REF"; then failcheck "no_live_project_ref_in_env"; else check "no_live_project_ref_in_env"; fi
          CRON_EXT=$(psql -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_extension where extname = 'pg_cron'")
          if [ "$CRON_EXT" = "1" ]; then check "pg_cron_extension_present"; else failcheck "pg_cron_extension_present"; fi
          CRON_SCHEMA=$(psql -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_namespace where nspname = 'cron'")
          if [ "$CRON_SCHEMA" = "1" ]; then check "cron_schema_present"; else failcheck "cron_schema_present"; fi
          REALTIME_PUB=$(psql -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_publication where pubname = 'supabase_realtime'")
          if [ "$REALTIME_PUB" = "1" ]; then check "supabase_realtime_publication_present"; else failcheck "supabase_realtime_publication_present"; fi
          ROLE_COUNT=$(psql -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_roles where rolname in ('anon','authenticated','service_role','authenticator')")
          if [ "$ROLE_COUNT" = "4" ]; then check "required_roles_present"; else failcheck "required_roles_present"; fi
          SCHEMA_COUNT=$(psql -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_namespace where nspname in ('auth','storage','extensions','cron')")
          if [ "$SCHEMA_COUNT" = "4" ]; then check "required_schemas_present"; else failcheck "required_schemas_present"; fi
          if [ "$fail" -eq 0 ]; then echo "PREFLIGHT_ALL_OK" | tee validation-artifact/20b-preflight.txt; else echo "PREFLIGHT_FAILED" | tee validation-artifact/20b-preflight.txt; exit 1; fi

      - name: Apply migrations (first pass, clean DB) [fail-closed]
        run: |
          set -euo pipefail
          shopt -s nullglob
          : > validation-artifact/21-migrate-first.txt
          for f in supabase/migrations/*.sql; do
            echo "-- Applying: $f" | tee -a validation-artifact/21-migrate-first.txt
            psql -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tee -a validation-artifact/21-migrate-first.txt
          done
          echo "FIRST_PASS=ok" | tee -a validation-artifact/21-migrate-first.txt

      - name: Validate pilot fixture migration source defines readiness RPC (fail-closed)
        run: |
          set -euo pipefail
          MIGRATION_FILE="supabase/migrations/20260713090000_pilot_fixture_and_readiness_rpc.sql"
          if [ ! -f "$MIGRATION_FILE" ]; then
          echo "MIGRATION_FAIL: $MIGRATION_FILE not found" >&2
          exit 1
          fi
          if ! grep -q "CREATE OR REPLACE FUNCTION public.fw_admin_check_pilot_fixtures_v1" "$MIGRATION_FILE"; then
          echo "MIGRATION_FAIL: fw_admin_check_pilot_fixtures_v1 not defined in $MIGRATION_FILE" >&2
          exit 1
          fi
          echo "MIGRATION_FILE_PRESENT_AND_DEFINES_RPC" | tee validation-artifact/19-migration-source-check.txt
      - name: Seed CI-only synthetic platform-admin for readiness RPC (fail-closed, disposable DB only)
        run: |
          set -euo pipefail
          set -o pipefail
          CI_ADMIN_ID="dddddddd-dddd-4ddd-addd-dddddddddddd"
          psql -v ON_ERROR_STOP=1 -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS \$fn\$ SELECT '${CI_ADMIN_ID}'::uuid \$fn\$;" 2>&1 | tee validation-artifact/22a-seed-ci-admin.txt
          psql -v ON_ERROR_STOP=1 -c "CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb LANGUAGE sql STABLE AS \$fn\$ SELECT jsonb_build_object('sub','${CI_ADMIN_ID}','role','authenticated') \$fn\$;" 2>&1 | tee -a validation-artifact/22a-seed-ci-admin.txt
          psql -v ON_ERROR_STOP=1 -c "ALTER TABLE auth.users DISABLE TRIGGER ALL; INSERT INTO auth.users (id, email) VALUES ('${CI_ADMIN_ID}', 'ci-synthetic-admin@example.invalid') ON CONFLICT (id) DO NOTHING; ALTER TABLE auth.users ENABLE TRIGGER ALL;" 2>&1 | tee -a validation-artifact/22a-seed-ci-admin.txt
          psql -v ON_ERROR_STOP=1 -c "INSERT INTO public.user_roles (user_id, role) VALUES ('${CI_ADMIN_ID}', 'platform_admin'::public.app_role) ON CONFLICT DO NOTHING;" 2>&1 | tee -a validation-artifact/22a-seed-ci-admin.txt
          ADMIN_OK=$(psql -v ON_ERROR_STOP=1 -t -A -c "SELECT public.p5b3_is_platform_admin();" | tr -d '[:space:]')
          echo "ADMIN_CHECK_RESULT=${ADMIN_OK}" | tee -a validation-artifact/22a-seed-ci-admin.txt
          if [ "$ADMIN_OK" != "t" ]; then
          echo "CI_ADMIN_FAIL: p5b3_is_platform_admin did not return true (got ${ADMIN_OK})" >&2
          exit 1
          fi
          echo "CI_SYNTHETIC_ADMIN_VERIFIED" | tee -a validation-artifact/22a-seed-ci-admin.txt
      - name: Fixture and readiness verification via fw_admin_check_pilot_fixtures_v1 (fail-closed)
        run: |
          set -euo pipefail
          set -o pipefail
          RPC_OUT=$(psql -v ON_ERROR_STOP=1 -t -A -F',' -c "SELECT check_key, status FROM public.fw_admin_check_pilot_fixtures_v1() ORDER BY check_key;")
          echo "$RPC_OUT" | tee validation-artifact/22-fixtures.txt
          EXPECTED_KEYS="buyer_org demo_match doc_bol doc_invoice evidence_pack funder_org_bank funder_org_isolation isolation_no_release seller_org"
          for key in $EXPECTED_KEYS; do
          row=$(echo "$RPC_OUT" | grep "^${key},")
          if [ -z "$row" ]; then
          echo "FIXTURE_FAIL: missing check_key ${key} in RPC output" >&2
          exit 1
          fi
          status=$(echo "$row" | cut -d',' -f2)
          if [ "$status" != "Ready" ]; then
          echo "FIXTURE_FAIL: check_key ${key} has status ${status}, expected Ready" >&2
          exit 1
          fi
          done
          echo "FIXTURES_READY_ALL_NINE" | tee -a validation-artifact/22-fixtures.txt

      - name: Isolation invariant (fail-closed)
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 <<SQL 2>&1 | tee validation-artifact/23-isolation.txt
                -- Isolation Test Fund must never appear on any release row.
          -- This check does NOT require any release to exist for the
          -- other pilot funder fixture; it only forbids releases pointing
          -- at the isolation fixture.
          DO \$\$
          DECLARE v_bad int;
          BEGIN
            SELECT count(*) INTO v_bad
              FROM public.funder_deal_releases
             WHERE funder_organisation_id = '${ISOLATION_TEST_FUND_ID}';
            IF v_bad <> 0 THEN
              RAISE EXCEPTION 'ISOLATION_FAIL: % release row(s) point at Isolation Test Fund', v_bad;
            END IF;
            RAISE NOTICE 'ISOLATION_OK';
          END \$\$;
          SQL

      - name: Generate Supabase types from disposable database (evidence step)
        run: |
          set -o pipefail
          touch validation-artifact/26-generated-types.ts validation-artifact/26b-generate-stderr.txt validation-artifact/27-types-diff.txt
          npx -y supabase@latest --version > validation-artifact/26a-supabase-cli-version.txt 2>&1 || true
          cat validation-artifact/26a-supabase-cli-version.txt || true
          npx -y supabase@latest gen types typescript --db-url "postgresql://supabase_admin:postgres@127.0.0.1:5432/postgres" --schema public > validation-artifact/26-generated-types.ts 2> validation-artifact/26b-generate-stderr.txt || true
          echo "===STDERR_START==="
          cat validation-artifact/26b-generate-stderr.txt || true
          echo "===STDERR_END==="
          wc -l validation-artifact/26-generated-types.ts || true
          echo "===RPC_SIGNATURE_START==="
          grep -A 12 "fw_admin_check_pilot_fixtures_v1" validation-artifact/26-generated-types.ts || echo "RPC_NOT_FOUND_IN_GENERATED_TYPES"
          echo "===RPC_SIGNATURE_END==="
          echo "===TYPES_DIFF_START==="
          diff -u src/integrations/supabase/types.ts validation-artifact/26-generated-types.ts > validation-artifact/27-types-diff.txt || true
          cat validation-artifact/27-types-diff.txt || true
          echo "===TYPES_DIFF_END==="
          echo "DIFF_LINE_COUNT=$(wc -l < validation-artifact/27-types-diff.txt)"

      - name: Reset DB and re-apply migrations (idempotency) [fail-closed]
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 <<'SQL' 2>&1 | tee validation-artifact/24-reset.txt
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO postgres, anon, authenticated, service_role;
          SQL
          shopt -s nullglob
          : > validation-artifact/25-migrate-second.txt
          for f in supabase/migrations/*.sql; do
            echo "-- Re-applying: $f" | tee -a validation-artifact/25-migrate-second.txt
            psql -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tee -a validation-artifact/25-migrate-second.txt
          done
          echo "SECOND_PASS=ok" | tee -a validation-artifact/25-migrate-second.txt

      - name: Final gate - all mandatory checks must be PASS
        if: always()
        run: |
          set -euo pipefail
          fail=0
          pass_or_fail() {
            local label="$1"; local file="$2"; local needle="$3"
            if [ -f "$file" ] && grep -q "$needle" "$file"; then
              echo "PASS  $label"
            else
              echo "FAIL  $label"
              fail=1
            fi
          }
          {
            echo "# PR #26 Pilot Readiness - DB validation summary"
            echo
            echo "Commit: $GITHUB_SHA"
            echo
            echo "## Mandatory checks"
            pass_or_fail "bootstrap"        validation-artifact/20-bootstrap.txt      "CREATE"
                        pass_or_fail "preflight"       validation-artifact/20b-preflight.txt "PREFLIGHT_ALL_OK"
            pass_or_fail "migrate_first"    validation-artifact/21-migrate-first.txt  "FIRST_PASS=ok"
                    pass_or_fail "migration_source"  validation-artifact/19-migration-source-check.txt  "MIGRATION_FILE_PRESENT_AND_DEFINES_RPC"
                    pass_or_fail "ci_admin_seed"  validation-artifact/22a-seed-ci-admin.txt  "CI_SYNTHETIC_ADMIN_VERIFIED"
                    pass_or_fail "fixtures"  validation-artifact/22-fixtures.txt  "FIXTURES_READY_ALL_NINE"
            pass_or_fail "isolation"        validation-artifact/23-isolation.txt      "ISOLATION_OK"
            pass_or_fail "migrate_second"   validation-artifact/25-migrate-second.txt "SECOND_PASS=ok"
            echo
            if [ "$fail" -eq 0 ]; then
              echo "RESULT: PASS"
            else
              echo "RESULT: FAIL"
            fi
          } | tee validation-artifact/99-verdict.md
          exit $fail

      - name: Upload database validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr26-database-validation
          path: validation-artifact/
